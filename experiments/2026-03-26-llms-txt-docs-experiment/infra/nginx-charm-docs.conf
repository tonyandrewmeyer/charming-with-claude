# Map Accept header to a flag for content negotiation.
# When the client sends "Accept: text/markdown, ..." we try to serve .md
map $http_accept $try_markdown {
    default         "";
    "~text/markdown" ".md";
}

server {
    listen 443 ssl;
    server_name documentation.ubuntu.com;

    ssl_certificate     /home/ubuntu/llms-txt-experiment/certs/documentation.ubuntu.com.pem;
    ssl_certificate_key /home/ubuntu/llms-txt-experiment/certs/documentation.ubuntu.com-key.pem;

    access_log /home/ubuntu/llms-txt-experiment/logs/access.log combined;

    # Strip version prefixes to match real URL patterns the agent knows from
    # training data. Each repo has a different convention on the real site:
    #   ops:       /ops/latest/foo
    #   pebble:    /pebble/latest/foo
    #   jubilant:  /jubilant/latest/foo
    #   charmlibs: no version prefix (already flat)
    #   charmcraft: /charmcraft/stable/foo  or  /charmcraft/latest/foo
    #   juju:      /juju/latest/foo  or  /juju/3.6/foo
    # None use "en/" but the agent may hallucinate it from other Ubuntu docs
    # on the same domain, so we strip that too.
    rewrite ^/(ops|pebble|jubilant|juju)/latest/(.*)$ /$1/$2 last;
    rewrite ^/(charmcraft)/(stable|latest)/(.*)$ /$1/$3 last;
    rewrite ^/(juju)/([0-9]+\.[0-9]+)/(.*)$ /$1/$3 last;

    # Strip hallucinated "en/" prefix (other docs on documentation.ubuntu.com
    # use /en/latest/ but these repos don't)
    rewrite ^/(ops|pebble|jubilant|charmlibs|charmcraft|juju)/en/[^/]+/(.*)$ /$1/$2 last;

    # Test page
    location /test/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/test/;
        try_files $uri $uri/ =404;
    }

    # Content negotiation: when Accept includes text/markdown, try the .md
    # version first. sphinx-llm generates index.html.md alongside index.html.
    # The try_files chain:
    #   1. $uri$try_markdown  — e.g. /ops/reference/ops/index.html.md (if Accept: text/markdown)
    #   2. $uri               — the original file (e.g. index.html)
    #   3. $uri/index.html$try_markdown — directory with .md index
    #   4. $uri/index.html    — directory with HTML index
    #   5. 404

    # ops docs
    location /ops/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/operator/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }

    # pebble docs
    location /pebble/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/pebble/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }

    # jubilant docs
    location /jubilant/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/jubilant/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }

    # charmlibs docs
    location /charmlibs/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/charmlibs/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }

    # charmcraft docs
    location /charmcraft/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/charmcraft/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }

    # juju docs
    location /juju/ {
        alias /home/ubuntu/llms-txt-experiment/docs-output/juju/;
        try_files $uri$try_markdown $uri $uri/index.html$try_markdown $uri/index.html =404;
    }
}

server {
    listen 80;
    server_name documentation.ubuntu.com;
    return 301 https://$host$request_uri;
}
