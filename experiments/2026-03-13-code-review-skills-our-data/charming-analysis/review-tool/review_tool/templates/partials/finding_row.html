<tr class="finding-row"
    id="finding-row-{{ f.id }}"
    hx-get="/findings/{{ f.id }}"
    hx-target="#detail-panel"
    hx-swap="innerHTML"
    style="cursor: pointer;">
    <td><span class="severity-badge severity-{{ f.severity|lower }}">{{ f.severity[0] }}</span></td>
    <td>{{ f.bug_id }}</td>
    <td>{{ f.repo|replace("-operator", "") }}</td>
    <td>
        {% if f.review_status == "pending" %}
        <span class="status-pending" title="Pending">&#9679;</span>
        {% elif f.review_status == "reviewed" %}
        <span class="status-reviewed" title="Reviewed">&#10003;</span>
        {% else %}
        <span class="status-fp" title="False Positive">&#10007;</span>
        {% endif %}
    </td>
</tr>
