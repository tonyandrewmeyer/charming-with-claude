<div class="grid">
    <small>
        <strong>{{ stats.reviewed + stats.false_positive }}</strong>/{{ stats.total }} reviewed
        {% if stats.false_positive %} | {{ stats.false_positive }} FP{% endif %}
        | {{ stats.pending }} pending
    </small>
    <progress value="{{ stats.reviewed + stats.false_positive }}" max="{{ stats.total }}" style="margin: 0.5rem 0;"></progress>
</div>
