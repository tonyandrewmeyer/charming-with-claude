<small class="kbd-help"><kbd>J</kbd><kbd>K</kbd> navigate &middot; <kbd>N</kbd> notes</small>
<table class="findings-table" role="grid">
    <thead>
        <tr>
            <th>Sev</th>
            <th>ID</th>
            <th>Repo</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for f in findings %}
        {% include "partials/finding_row.html" with context %}
        {% endfor %}
        {% if not findings %}
        <tr><td colspan="4">No findings match the current filters.</td></tr>
        {% endif %}
    </tbody>
</table>
